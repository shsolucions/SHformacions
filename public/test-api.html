<body>

<div id="log">Esperant...</div>

<script>
const API_KEY = 'AIzaSyB61sipRyfM1oTJA4Cs3ZX9ymuy1uUnUoE';
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxajW8iSKdXpCKDIt3xCjYr466gqjnABDhN1mNr8gXLDwmW6985pjB8qOXK6b91aFx-wg/exec';
const SHEET_ID = '1v_w1Gh3K5MiyrlMubPw5pZKXoCjHO85BSq7aR0ka60Q';

function log(msg, cls = '') {
  const d = document.getElementById('log');
  const t = new Date().toLocaleTimeString();
  d.innerHTML += `<span class="${cls}">[${t}] ${msg}</span>\n`;
  d.scrollTop = d.scrollHeight;
}
function clearLog() { document.getElementById('log').innerHTML = ''; }

async function geminiCall(messages, systemPrompt) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: systemPrompt }] },
      contents: messages,
      generationConfig: { temperature: 0.8, maxOutputTokens: 400 }
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || 'BUIT';
}

async function testKey() {
  log('🔑 Testant clau API...', 'info');
  log(`Clau: ${API_KEY.slice(0,8)}...`, 'info');
  try {
    const r = await geminiCall(
      [{ role: 'user', parts: [{ text: 'Respon "OK" i res més.' }] }],
      'Ets un assistent. Respon breument.'
    );
    log('✅ API FUNCIONA! Resposta: ' + r, 'ok');
  } catch(e) {
    log('❌ ERROR: ' + e.message, 'err');
  }
}

const SYSTEM = `Ets l'assistent virtual de SHformacions. Respon en català. 
CATALEG: Word Inicial 8h 75EUR Bàsic Presencial | Word Intermedi 12h 110EUR | Excel Inicial 10h 90EUR | Excel Intermedi 12h 140EUR | Excel Avançat 12h 180EUR | IA Inicial 10h 120EUR | IA Avançada 20h 220EUR
Quan et pregunten sobre cursos per a un grup, aplica 10% de descompte a partir de 10 persones.
Ets proper, breu, en català.`;

async function testConv1() {
  log('\n📚 CONVERSA 1: Word bàsic per a 10 persones', 'info');
  const hist = [];
  const turns = [
    'Hola, m\'interessa un curs de Word bàsic per a 10 persones de la meva empresa',
    'Sí, és per a personal administratiu que no ha usat mai el Word',

    'Perfecte! El meu nom és Maria Garcia. El telèfon és 666111222 i el correu maria@empresa.cat'
  ];
  for (const msg of turns) {
    log('👤 Client: ' + msg, 'msg');
    hist.push({ role: 'user', parts: [{ text: msg }] });
    try {
      const r = await geminiCall(hist, SYSTEM);
      log('🤖 Assistent: ' + r, 'ok');
      hist.push({ role: 'model', parts: [{ text: r }] });
      await saveToSheet('666111222', 'maria@empresa.cat', 'Word bàsic 10 persones empresa administrativa', 'Word Inicial');
    } catch(e) { log('❌ ' + e.message, 'err'); break; }
  }
}

async function saveToSheet(phone, email, summary, courses) {
  try {
    await fetch(SHEET_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, email, summary, courses, fullChat: summary })
    });
    log(`💾 Guardat al Sheets: ${phone} | ${courses}`, 'ok');
  } catch(e) { log('⚠️ Sheets: ' + e.message, 'err'); }
}

async function testSheets() {

    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=tCat%C3%A0legPreus`;
    const res = await fetch(url);
    const text = await res.text();
    if (text.startsWith('<')) {
      log('❌ Sheets NO és públic! Cal compartir-lo com a visualitzador.', 'err');
    } else {
      log('✅ Sheets accessible! Primeres línies:', 'ok');
      log(text.split('\n').slice(0, 5).join('\n'), 'info');
    }
  } catch(e) { log('❌ ' + e.message, 'err'); }
}
